[defaults.rsync]
flags = ["-a", "-v", "-h", "-P"]

[defaults.rclone]
flags = ["--copy-links", "--fast-list"]
filter_file = "~/.config/rclone/filters.txt"
transfers = 4
checkers = 8
bwlimit = "10M"
drive_chunk_size = "64M"
buffer_size = "64M"
use_mmap = true
timeout = "10m"
contimeout = "60s"
low_level_retries = 10
order_by = "modtime,asc"

[[job]]
name = "photos"
engine = "rsync"
sources = ["/tmp/src/photos/"]
destination = "~/Pictures/Backup/"
delete = false
extra_flags = ["--exclude=.*"]

[[job]]
name = "projects"
engine = "rsync"
sources = [
    "~/Projects/app-one",
    "~/Projects/app-two",
    "~/Projects/notes.txt",
]
destination = "/tmp/dst/projects"
delete = true

[[job]]
name = "documents-to-cloud"
engine = "rclone"
source = "~/Documents"
remotes = ["my_gdrive", "my_s3"]
mode = "sync"
backup_path = "_archive"
backup_retention_days = 365

[[job]]
name = "music-to-cloud"
engine = "rclone"
source = "/tmp/src/Music"
remotes = ["my_gdrive"]
mode = "copy"
bwlimit = "2M"
