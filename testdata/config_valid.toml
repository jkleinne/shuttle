[defaults.rsync]
flags = ["-a", "-v", "-h", "-P"]

[defaults.rclone]
flags = ["--copy-links", "--fast-list"]
filter_file = "~/.config/rclone/filters.txt"
transfers = 6
checkers = 16
bwlimit = "5.5M"
drive_chunk_size = "64M"
buffer_size = "64M"
use_mmap = true
timeout = "10m"
contimeout = "90s"
low_level_retries = 15
order_by = "modtime,asc"

[[job]]
name = "manga"
engine = "rsync"
sources = ["/tmp/src/mangas/"]
destination = "~/Comics/"
delete = false
extra_flags = ["--exclude=.*"]

[[job]]
name = "secrets"
engine = "rsync"
sources = [
    "~/.age",
    "~/.minisign",
    "~/.config/chezmoi/chezmoi.toml",
]
destination = "/tmp/dst/secrets"
delete = true

[[job]]
name = "documents-to-cloud"
engine = "rclone"
source = "~/Documents"
remotes = ["crypt_gdrive", "crypt_koofr"]
mode = "sync"
backup_path = "_archive"
backup_retention_days = 365

[[job]]
name = "music-to-cloud"
engine = "rclone"
source = "/tmp/src/Music"
remotes = ["crypt_gdrive"]
mode = "copy"
bwlimit = "2M"
