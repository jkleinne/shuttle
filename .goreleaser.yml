version: 2

project_name: shuttle

before:
  hooks:
    - go mod tidy

builds:
  - id: shuttle
    main: ./cmd/shuttle
    binary: shuttle
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      # Linux arm64 is intentionally excluded; macOS arm64 + amd64 and Linux
      # amd64 are the supported targets.
      - goos: linux
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - config.example.toml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^test:"
      - "^style:"
      - "^ci:"
      - "^chore:"
      - "^build:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: Other
      order: 999

release:
  github:
    owner: jkleinne
    name: shuttle
  draft: false
  prerelease: auto

brews:
  - name: shuttle
    repository:
      owner: jkleinne
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/jkleinne/shuttle"
    description: "Personal backup and synchronization CLI orchestrating rsync and rclone via a single TOML config"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "brew: {{ .ProjectName }} {{ .Tag }}"
    dependencies:
      - name: rsync
      - name: rclone
    test: |
      system "#{bin}/shuttle", "version"
    skip_upload: auto
