# Shuttle Configuration
# Location: ${XDG_CONFIG_HOME:-~/.config}/shuttle/config.toml

# -- Default flags for each engine (optional) --
# Shuttle injects a small set of instrumentation flags (--stats, progress)
# for stats capture. All other flags come from these defaults or per-job
# extra_flags. Per-job fields override defaults via last-flag-wins.

[defaults]
# Age in days after which per-run log files under the shuttle log
# directory are pruned on startup. Default is 30 when unset. Set to 0
# to disable pruning entirely; negative values are rejected.
# log_retention_days = 30

[defaults.rsync]
flags = ["-a", "-v", "-h", "-P", "-u"]
# macOS users: add "--exclude=.DS_Store" to skip Finder metadata files

[defaults.rclone]
flags = ["--copy-links", "--fast-list", "--track-renames", "--track-renames-strategy", "modtime,size", "--update"]
# filter_file = "~/.config/rclone/filters.txt"
transfers = 4
checkers = 8
bwlimit = "10M"
drive_chunk_size = "64M"
buffer_size = "64M"
use_mmap = true
timeout = "10m"
contimeout = "60s"
low_level_retries = 10
order_by = "modtime,asc"

# -- Jobs, executed in config order --
# Each job declares an engine ("rsync" or "rclone") and the fields
# relevant to that engine.

# Rsync job: sync photos to an external drive
[[job]]
name = "photos"
engine = "rsync"
sources = ["~/photos/"]
destination = "/mnt/backup/photos/"
delete = false
extra_flags = ["--exclude=.*"]

# Rsync job: back up projects to an external drive
[[job]]
name = "projects"
engine = "rsync"
sources = [
    "~/projects/app-one",
    "~/projects/app-two",
]
destination = "/mnt/backup/projects/"
delete = true

# Rclone job: sync documents to multiple cloud remotes
# Remotes must already be configured in rclone (run `rclone config`).
[[job]]
name = "documents-to-cloud"
engine = "rclone"
source = "~/documents"
remotes = ["my_gdrive", "my_s3"]
mode = "sync"
backup_path = "_archive"
backup_retention_days = 365

# Rclone job: copy media (bandwidth-limited)
[[job]]
name = "media-to-cloud"
engine = "rclone"
source = "/mnt/backup/media"
remotes = ["my_gdrive"]
mode = "copy"
bwlimit = "2M"
