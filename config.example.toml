# Shuttle Configuration
# Location: ${XDG_CONFIG_HOME:-~/.config}/shuttle/config.toml

# -- Defaults --
# [defaults] holds cross-cutting settings. [defaults.rsync] and
# [defaults.rclone] hold engine-specific defaults (flags, tuning).
# For engine flags, shuttle injects a small set of instrumentation flags
# (--stats, progress) for stats capture. All other flags come from the
# engine defaults below or per-job extra_flags. Per-job fields override
# defaults via last-flag-wins.

[defaults]
# log_retention_days: age (in days) after which per-run log files under
# ${XDG_STATE_HOME:-~/.local/state}/shuttle/logs/ are pruned on startup.
# Default: 30. Set to 0 to disable pruning; negative values are rejected.
# This setting is global — there is no per-job override.
# log_retention_days = 14

[defaults.rsync]
flags = ["-a", "-v", "-h", "-P", "-u"]
# macOS users: add "--exclude=.DS_Store" to skip Finder metadata files

[defaults.rclone]
flags = ["--copy-links", "--fast-list", "--track-renames", "--track-renames-strategy", "modtime,size", "--update"]
# filter_file = "~/.config/rclone/filters.txt"
transfers = 4
checkers = 8
bwlimit = "10M"
drive_chunk_size = "64M"
buffer_size = "64M"
use_mmap = true
timeout = "10m"
contimeout = "60s"
low_level_retries = 10
order_by = "modtime,asc"

# -- Jobs, executed in config order --
# Each job declares an engine ("rsync" or "rclone") and the fields
# relevant to that engine.

# Rsync job: sync photos to an external drive
[[job]]
name = "photos"
engine = "rsync"
sources = ["~/photos/"]
destination = "/mnt/backup/photos/"
delete = false
extra_flags = ["--exclude=.*"]

# Rsync job: back up projects to an external drive
[[job]]
name = "projects"
engine = "rsync"
sources = [
    "~/projects/app-one",
    "~/projects/app-two",
]
destination = "/mnt/backup/projects/"
delete = true

# Rclone job: sync documents to multiple cloud remotes
# Remotes must already be configured in rclone (run `rclone config`).
[[job]]
name = "documents-to-cloud"
engine = "rclone"
source = "~/documents"
remotes = ["my_gdrive", "my_s3"]
mode = "sync"
backup_path = "_archive"
backup_retention_days = 365

# Rclone job: copy media (bandwidth-limited)
[[job]]
name = "media-to-cloud"
engine = "rclone"
source = "/mnt/backup/media"
remotes = ["my_gdrive"]
mode = "copy"
bwlimit = "2M"
# optional = true          # skip without failure if the local source is absent
                            # (useful for detachable devices like external drives)
